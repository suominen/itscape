      <text x="20" y="32" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="16" font-weight="bold" fill="#bd93f9">[ arch/arm64/kvm · vgic-its ]</text>
      <text x="20" y="52" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="14" fill="#9b9b9d">Double-put on the translation cache</text>
    </g>

    <path d="M 250 140 L 250 180" fill="none" stroke="#8be9fd" stroke-width="2" stroke-dasharray="4" />
    <polygon points="250,185 245,175 255,175" fill="#8be9fd" />

    <g transform="translate(40, 190)">
      <rect width="420" height="70" rx="6" fill="#2e2e33" stroke="#8be9fd" stroke-width="1" />
      <text x="20" y="32" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="16" font-weight="bold" fill="#8be9fd">[ vgic_irq · Use-After-Free ]</text>
      <text x="20" y="52" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="14" fill="#9b9b9d">Freed while an ITE still maps it</text>
    </g>

    <path d="M 250 260 L 250 300" fill="none" stroke="#50fa7b" stroke-width="2" stroke-dasharray="4" />
    <polygon points="250,305 245,295 255,295" fill="#50fa7b" />

