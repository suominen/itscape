<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#1d1e20" />

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2e2e33" stroke-width="1" />
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8be9fd" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />

  <rect width="1200" height="6" fill="#bd93f9" />

  <text x="80" y="145" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-weight="900" font-size="58" fill="#dadada" letter-spacing="-1">
    ITSCAPE
  </text>

  <text x="80" y="200" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-weight="600" font-size="28" fill="#bd93f9" letter-spacing="1">
    VULNERABILITY TRACKER
  </text>
  <text x="80" y="240" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-weight="600" font-size="28" fill="#bd93f9" letter-spacing="1">
    CVE-2026-46316
  </text>

  <text x="80" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="28" fill="#9b9b9d" width="600">
    Linux Kernel KVM/arm64 vGIC-ITS Race
  </text>
  <line x1="80" y1="330" x2="105" y2="330" stroke="#9b9b9d" stroke-width="2.5" />
  <polygon points="114,330 104,324 104,336" fill="#9b9b9d" />
  <text x="126" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="28" fill="#9b9b9d">
    Guest to Host Kernel (ARM64)
  </text>

  <g transform="translate(80, 480)">
    <rect width="470" height="50" rx="6" fill="#2e2e33" stroke="#333333" stroke-width="1.5" />
    <text x="235" y="32" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="18" font-weight="bold" fill="#dadada" text-anchor="middle">
      kimmo.cloud/itscape/
    </text>
  </g>

  <g transform="translate(620, 100)">
    <rect width="500" height="430" rx="12" fill="#141516" stroke="url(#glow)" stroke-width="2" />

    <rect width="500" height="40" rx="12" fill="#232425" />
    <circle cx="25" cy="20" r="6" fill="#ff5555" />
    <circle cx="45" cy="20" r="6" fill="#ffb86c" />
    <circle cx="65" cy="20" r="6" fill="#50fa7b" />
    <text x="250" y="26" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="14" fill="#656668" text-anchor="middle">
