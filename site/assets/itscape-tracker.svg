  <g transform="translate(580, 480)">
    <rect width="120" height="50" rx="6" fill="#2e2e33" stroke="#bd93f9" stroke-width="1" stroke-opacity="0.4" />
    <text x="60" y="31" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#bd93f9" text-anchor="middle">
